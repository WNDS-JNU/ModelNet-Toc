server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /leaderboard {
    try_files /leaderboard/index.html =404;
  }

  location /leaderboard/ {
    try_files $uri $uri/ /leaderboard/index.html;
  }
}
