name: lobehub-toc

services:
  lobe:
    image: lobehub/lobehub:latest
    restart: always
    expose:
      - "3210"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.modelnet
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${LOBE_DB_NAME}
      INTERNAL_APP_URL: http://localhost:3210
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${RUSTFS_LOBE_BUCKET}
      S3_ENABLE_PATH_STYLE: "1"
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_SET_ACL: "0"
      LLM_VISION_IMAGE_USE_BASE64: "1"
      SEARXNG_URL: http://searxng:8080
      REDIS_URL: redis://redis:6379
      REDIS_PREFIX: lobehub-toc
      REDIS_TLS: "0"
    networks:
      - lobe-network
      - modelnet-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3210/signin').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  toc-lb:
    image: haproxy:2.9-alpine
    container_name: lobehub-toc-lb
    restart: always
    depends_on:
      lobe:
        condition: service_healthy
    ports:
      - "${LOBE_PORT}:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lobe-network

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: lobehub-toc-postgres
    restart: always
    environment:
      POSTGRES_DB: ${LOBE_DB_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lobe-network

  redis:
    image: redis:7-alpine
    container_name: lobehub-toc-redis
    restart: always
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lobe-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: lobehub-toc-rustfs
    restart: always
    ports:
      - "${RUSTFS_PORT}:9000"
      - "127.0.0.1:${RUSTFS_ADMIN_PORT}:9001"
    environment:
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    command: ["--access-key", "${RUSTFS_ACCESS_KEY}", "--secret-key", "${RUSTFS_SECRET_KEY}", "/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - lobe-network

  rustfs-init:
    image: minio/mc:latest
    container_name: lobehub-toc-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - ./bucket.config.json:/bucket.config.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eux
        mc alias set rustfs "http://rustfs:9000" "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}"
        mc mb "rustfs/${RUSTFS_LOBE_BUCKET}" --ignore-existing
        mc anonymous set-json "/bucket.config.json" "rustfs/${RUSTFS_LOBE_BUCKET}"
    env_file:
      - .env
    restart: "no"
    networks:
      - lobe-network

  searxng:
    image: searxng/searxng:latest
    container_name: lobehub-toc-searxng
    restart: always
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SETTINGS_FILE: /etc/searxng/settings.yml
    networks:
      - lobe-network

networks:
  lobe-network:
    driver: bridge
  modelnet-network:
    external: true
    name: librechat-toc_default

volumes:
  redis_data:
  rustfs_data:
