name: lobehub-toc-dev

services:
  lobe:
    image: ${DEV_LOBE_IMAGE:-lobehub-toc-dev-lobe}
    container_name: lobehub-toc-dev-lobe
    build:
      context: ${LOBEHUB_TOC_SRC:-./lobehub}
    restart: unless-stopped
    expose:
      - "3210"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      litellm:
        condition: service_started
    env_file:
      - .env
      - .env.modelnet
      - .env.dev
    volumes:
      - ./leaderboard/data:/app/leaderboard/data:ro
    environment:
      APP_URL: ${DEV_APP_URL:-http://127.0.0.1:3181}
      INTERNAL_APP_URL: http://localhost:3210
      LOBE_DB_NAME: ${DEV_LOBE_DB_NAME:-lobechat_dev}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${DEV_LOBE_DB_NAME:-lobechat_dev}
      MODELNET_LEADERBOARD_DATA_DIR: /app/leaderboard/data
      OPENAI_PROXY_URL: http://litellm:8000/v1
      S3_ENDPOINT: http://rustfs:9000
      S3_BUCKET: ${RUSTFS_LOBE_BUCKET}
      S3_ENABLE_PATH_STYLE: "1"
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_SET_ACL: "0"
      LLM_VISION_IMAGE_USE_BASE64: "1"
      SEARXNG_URL: http://searxng:8080
      REDIS_URL: redis://redis:6379
      REDIS_PREFIX: lobehub-toc-dev
      REDIS_TLS: "0"
    networks:
      - lobe-dev-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3210/signin').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  toc-lb:
    image: haproxy:2.9-alpine
    container_name: lobehub-toc-dev-lb
    restart: unless-stopped
    depends_on:
      lobe:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DEV_LOBE_PORT:-3181}:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lobe-dev-network

  modelnet-router:
    image: ${DEV_ROUTER_IMAGE:-lobehub-toc-dev-modelnet-router}
    container_name: modelnet-router-dev
    build:
      context: ./modelnet_router
    restart: unless-stopped
    environment:
      MODELNET_BACKEND_API_KEY: ${MODELNET_BACKEND_API_KEY:-none}
      MODELNET_ROUTER_API_KEY: ${MODELNET_BACKEND_API_KEY:-none}
      MODELNET_API_KEYS_JSON: ${MODELNET_API_KEYS_JSON:-}
      MODELNET_API_KEYS: ${MODELNET_API_KEYS:-}
      MODELNET_REGISTRY_PATH: /app/model_net.yaml
      MODELNET_K8S_NAMESPACE: inference
      MODELNET_LLAMA_CPP_NAMESPACE: llama-cpp
      MODELNET_PROMETHEUS_NAMESPACE: kuboard
      MODELNET_PROMETHEUS_SERVICE: prometheus-k8s
      MODELNET_PROMETHEUS_PORT: "9090"
      MODELNET_ROUTER_MODEL_NAME: modelnet
      MODELNET_CLAIM_ENABLED: ${MODELNET_CLAIM_ENABLED:-false}
      MODELNET_CLAIM_DB_PATH: /data/modelnet_claims/modelnet_claims.sqlite3
      MODELNET_CLAIM_MEMORY_TIMEOUT_MS: ${MODELNET_CLAIM_MEMORY_TIMEOUT_MS:-50}
      MODELNET_CLAIM_FRONTIER_K: ${MODELNET_CLAIM_FRONTIER_K:-3}
      MODELNET_CLAIM_VERIFY_MAX_TOKENS: ${MODELNET_CLAIM_VERIFY_MAX_TOKENS:-160}
      MODELNET_ENSEMBLE_DEFAULT_MAX_TOKENS: ${MODELNET_ENSEMBLE_DEFAULT_MAX_TOKENS:-256}
      MODELNET_AUTO_ROLE_GRAPH_CRITIC_MAX_TOKENS: ${MODELNET_AUTO_ROLE_GRAPH_CRITIC_MAX_TOKENS:-384}
      MODELNET_AUTO_ROLE_GRAPH_SYNTHESIS_MAX_TOKENS: ${MODELNET_AUTO_ROLE_GRAPH_SYNTHESIS_MAX_TOKENS:-1536}
      MODELNET_RESPONSE_AGGREGATE_MAX_TOKENS: ${MODELNET_RESPONSE_AGGREGATE_MAX_TOKENS:-4096}
      MODELNET_RESPONSE_SYNTHESIS_MAX_CONTINUATIONS: ${MODELNET_RESPONSE_SYNTHESIS_MAX_CONTINUATIONS:-2}
      MODELNET_ENSEMBLE_MAX_SOURCES: ${MODELNET_ENSEMBLE_MAX_SOURCES:-16}
      KUBECONFIG: /app/kubeconfig
    volumes:
      - type: bind
        source: /home/duxianghe/dify/api/configs/model_net.yaml
        target: /app/model_net.yaml
        read_only: true
      - type: bind
        source: /home/duxianghe/.kube/config
        target: /app/kubeconfig
        read_only: true
      - type: volume
        source: modelnet_dev_claims
        target: /data/modelnet_claims
    expose:
      - "8000"
    ports:
      - "127.0.0.1:${DEV_MODELNET_GATEWAY_PORT:-3192}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\""]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 15s
    networks:
      - lobe-dev-network

  litellm:
    image: ${DEV_LITELLM_IMAGE:-lobehub-toc-litellm-modelnet}
    container_name: modelnet-litellm-dev
    restart: unless-stopped
    depends_on:
      modelnet-router:
        condition: service_healthy
    environment:
      MODELNET_LITELLM_API_KEY: ${MODELNET_LITELLM_API_KEY}
      MODELNET_BACKEND_API_KEY: ${MODELNET_BACKEND_API_KEY:-none}
    volumes:
      - type: bind
        source: ./litellm/modelnet-config.yaml
        target: /app/config.yaml
        read_only: true
    ports:
      - "127.0.0.1:${DEV_LITELLM_PORT:-3190}:8000"
    expose:
      - "8000"
    command: ["--config", "/app/config.yaml", "--port", "8000", "--num_workers", "4"]
    networks:
      - lobe-dev-network

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: lobehub-toc-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEV_LOBE_DB_NAME:-lobechat_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lobe-dev-network

  redis:
    image: redis:7-alpine
    container_name: lobehub-toc-dev-redis
    restart: unless-stopped
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lobe-dev-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: lobehub-toc-dev-rustfs
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DEV_RUSTFS_PORT:-9180}:9000"
      - "127.0.0.1:${DEV_RUSTFS_ADMIN_PORT:-9181}:9001"
    environment:
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs_dev_data:/data
    command: ["--access-key", "${RUSTFS_ACCESS_KEY}", "--secret-key", "${RUSTFS_SECRET_KEY}", "/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - lobe-dev-network

  rustfs-init:
    image: minio/mc:latest
    container_name: lobehub-toc-dev-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - ./bucket.config.json:/bucket.config.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eux
        mc alias set rustfs "http://rustfs:9000" "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}"
        mc mb "rustfs/${RUSTFS_LOBE_BUCKET}" --ignore-existing
        mc anonymous set-json "/bucket.config.json" "rustfs/${RUSTFS_LOBE_BUCKET}"
    env_file:
      - .env
      - .env.dev
    restart: "no"
    networks:
      - lobe-dev-network

  searxng:
    image: searxng/searxng:latest
    container_name: lobehub-toc-dev-searxng
    restart: unless-stopped
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SETTINGS_FILE: /etc/searxng/settings.yml
    networks:
      - lobe-dev-network

networks:
  lobe-dev-network:
    driver: bridge

volumes:
  modelnet_dev_claims:
  postgres_dev_data:
  redis_dev_data:
  rustfs_dev_data:
